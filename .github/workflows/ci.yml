name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type-check, lint & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Type-check ──────────────────────────────────────────────────────────
      - name: TypeScript type-check
        run: npx tsc --noEmit

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: ESLint
        run: npx next lint --max-warnings 0

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build
        run: npm run build
        env:
          # Provide stub values so the build does not fail on missing env vars.
          # Real secrets live only in Vercel; these are intentionally public-safe stubs.
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_ROBOTS_INDEX: "false"
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          SKIP_ENV_VALIDATION: "true"
