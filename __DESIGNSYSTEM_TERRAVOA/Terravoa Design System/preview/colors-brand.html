<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--tv-surface);font-family:var(--tv-font-sans);}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{height:80px;border-radius:var(--tv-radius-md);position:relative;}
  .sw .h{position:absolute;bottom:8px;left:10px;color:rgba(255,255,255,.85);font-size:9px;text-transform:uppercase;letter-spacing:.1em;font-feature-settings:"tnum";}
  .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--tv-on-surface-variant);margin-top:8px;}
</style></head>
<body>
<div class="grid">
  <div><div class="sw" style="background:#182a1b;"><div class="h">#182A1B</div></div><div class="lbl">primary · forest</div></div>
  <div><div class="sw" style="background:#2d4030;"><div class="h">#2D4030</div></div><div class="lbl">primary-container</div></div>
  <div><div class="sw" style="background:#944925;"><div class="h">#944925</div></div><div class="lbl">secondary · terracotta</div></div>
  <div><div class="sw" style="background:#fe9e72;"><div class="h" style="color:rgba(0,0,0,.6);">#FE9E72</div></div><div class="lbl">secondary-container</div></div>
  <div><div class="sw" style="background:#342306;"><div class="h">#342306</div></div><div class="lbl">tertiary · warm dark</div></div>
  <div><div class="sw" style="background:#feddb3;"><div class="h" style="color:rgba(0,0,0,.6);">#FEDDB3</div></div><div class="lbl">tertiary-fixed · cream</div></div>
  <div><div class="sw" style="background:#1a1c1a;"><div class="h">#1A1C1A</div></div><div class="lbl">on-surface</div></div>
  <div><div class="sw" style="background:#434842;"><div class="h">#434842</div></div><div class="lbl">on-surface-variant</div></div>
</div>
</body></html>
