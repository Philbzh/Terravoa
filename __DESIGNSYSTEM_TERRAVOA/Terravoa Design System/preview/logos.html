<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--tv-surface);display:flex;flex-direction:column;gap:20px;align-items:center;}
  .row{display:flex;align-items:center;gap:32px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  img{height:80px;mix-blend-mode:multiply;object-fit:contain;}
  .lbl{font-family:var(--tv-font-sans);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--tv-on-surface-variant);}
  .em{height:64px;width:64px;}
</style></head>
<body>
<div class="row">
  <div class="item"><img src="../assets/logos/terravoa-wordmark.png"><div class="lbl">Wordmark</div></div>
  <div class="item"><img class="em" src="../assets/logos/terravoa-emblem-final.png"><div class="lbl">Emblem · final</div></div>
  <div class="item"><img class="em" src="../assets/logos/terravoa-emblem-v2.png"><div class="lbl">Emblem · v2</div></div>
  <div class="item"><img class="em" src="../assets/logos/terravoa-emblem-v3.png"><div class="lbl">Emblem · v3</div></div>
</div>
</body></html>
