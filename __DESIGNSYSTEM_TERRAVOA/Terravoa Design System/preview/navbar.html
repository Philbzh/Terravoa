<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--tv-surface);font-family:var(--tv-font-sans);}
  .nav{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:14px 24px;background:var(--tv-surface);border-bottom:1px solid rgba(195,200,192,.2);box-shadow:0 1px 2px rgba(26,28,26,.04);}
  .links{display:flex;gap:24px;}
  .link{color:rgba(24,42,27,.7);font-size:11px;text-transform:uppercase;letter-spacing:.15em;font-weight:500;}
  .logo img{height:54px;mix-blend-mode:multiply;}
  .right{display:flex;justify-content:flex-end;align-items:center;gap:10px;}
  .signin{font-size:11px;text-transform:uppercase;letter-spacing:.15em;font-weight:600;color:var(--tv-primary);border:1px solid rgba(24,42,27,.25);padding:6px 14px;border-radius:9999px;}
  .producer{font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:600;color:var(--tv-secondary);}
</style></head>
<body>
<div class="nav">
  <div class="links">
    <span class="link">Shop</span><span class="link">Producers</span><span class="link">Journal</span><span class="link">About</span>
  </div>
  <div class="logo"><img src="../assets/logos/terravoa-wordmark.png"></div>
  <div class="right"><span class="signin">Sign In</span><span class="producer">Become a Producer</span></div>
</div>
</body></html>
