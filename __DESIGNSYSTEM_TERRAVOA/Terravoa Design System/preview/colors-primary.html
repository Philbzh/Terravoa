<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--tv-surface);}
  .row{display:flex;gap:0;border-radius:var(--tv-radius-md);overflow:hidden;height:88px;box-shadow:var(--tv-shadow-sm);}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;font-family:var(--tv-font-sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;}
  .hex{font-size:9px;opacity:.7;letter-spacing:.05em;text-transform:none;font-feature-settings:"tnum";}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--tv-primary);color:#fff;">Primary<span class="hex">#182a1b</span></div>
  <div class="sw" style="background:var(--tv-primary-container);color:#fff;">Container<span class="hex">#2d4030</span></div>
  <div class="sw" style="background:var(--tv-primary-fixed);color:var(--tv-primary);">Fixed<span class="hex">#d2e8d2</span></div>
  <div class="sw" style="background:var(--tv-primary-fixed-dim);color:var(--tv-primary);">Fixed-dim<span class="hex">#b6ccb6</span></div>
  <div class="sw" style="background:var(--tv-on-primary-container);color:var(--tv-primary);">On-container<span class="hex">#96ab97</span></div>
</div>
</body></html>
