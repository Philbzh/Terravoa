<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--tv-surface-dim);font-family:var(--tv-font-sans);}
  .stack{display:flex;flex-direction:column;border-radius:var(--tv-radius-md);overflow:hidden;border:1px solid rgba(195,200,192,.4);}
  .row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;font-size:11px;}
  .row .l{text-transform:uppercase;letter-spacing:.12em;font-weight:500;}
  .row .v{font-feature-settings:"tnum";opacity:.6;}
</style></head>
<body>
<div class="stack">
  <div class="row" style="background:#ffffff;color:#1a1c1a;"><span class="l">surface-container-lowest</span><span class="v">#FFFFFF</span></div>
  <div class="row" style="background:#faf9f6;color:#1a1c1a;"><span class="l">surface · canvas</span><span class="v">#FAF9F6</span></div>
  <div class="row" style="background:#f4f3f1;color:#1a1c1a;"><span class="l">surface-container-low</span><span class="v">#F4F3F1</span></div>
  <div class="row" style="background:#efeeeb;color:#1a1c1a;"><span class="l">surface-container</span><span class="v">#EFEEEB</span></div>
  <div class="row" style="background:#e9e8e5;color:#1a1c1a;"><span class="l">surface-container-high</span><span class="v">#E9E8E5</span></div>
  <div class="row" style="background:#e3e2e0;color:#1a1c1a;"><span class="l">surface-container-highest</span><span class="v">#E3E2E0</span></div>
</div>
</body></html>
