<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--tv-surface-container-low);font-family:var(--tv-font-sans);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:72px;height:72px;background:var(--tv-surface-container-lowest);}
  .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--tv-on-surface-variant);text-align:center;}
</style></head>
<body>
<div class="grid">
  <div class="cell"><div class="box" style="border-radius:6px;"></div><div class="lbl">sm · 6</div></div>
  <div class="cell"><div class="box" style="border-radius:12px;"></div><div class="lbl">md · 12</div></div>
  <div class="cell"><div class="box" style="border-radius:16px;"></div><div class="lbl">lg · 16</div></div>
  <div class="cell"><div class="box" style="border-radius:24px;"></div><div class="lbl">xl · 24</div></div>
  <div class="cell"><div class="box" style="border-radius:9999px;"></div><div class="lbl">full</div></div>
</div>
</body></html>
