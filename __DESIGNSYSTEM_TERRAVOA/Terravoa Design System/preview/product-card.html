<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--tv-surface-container-low);font-family:var(--tv-font-sans);}
  .card{width:240px;background:transparent;}
  .img{aspect-ratio:1;background:url('../assets/products/olive-oil.jpg') center/cover var(--tv-surface-container-lowest);border-radius:var(--tv-radius-lg);position:relative;overflow:hidden;}
  .badge{position:absolute;top:14px;right:14px;padding:6px 12px;border-radius:9999px;background:var(--tv-tertiary-fixed);color:var(--tv-tertiary);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:500;}
  .heart{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:9999px;background:rgba(250,249,246,.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;}
  .meta{display:flex;align-items:center;gap:6px;color:var(--tv-secondary);font-size:10px;text-transform:uppercase;letter-spacing:.15em;margin-top:18px;}
  .flag{width:18px;height:13px;background:linear-gradient(to right,#009246 33%,#fff 33% 66%,#ce2b37 66%);border-radius:2px;}
  .name{font-family:var(--tv-font-serif);color:var(--tv-primary);font-size:18px;margin:6px 0 4px;}
  .price{color:var(--tv-on-surface-variant);font-size:14px;}
  .ship{display:flex;align-items:center;gap:6px;color:rgba(67,72,66,.6);font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-top:8px;}
</style></head>
<body>
<div class="card">
  <div class="img"><div class="badge">Organic</div></div>
  <div class="meta"><div class="flag"></div>Tuscany &bull; Rossi Estate</div>
  <div class="name">Extra Virgin Cold-Pressed Oil</div>
  <div class="price">€32.00</div>
  <div class="ship">🚚 Ships directly from producer</div>
</div>
</body></html>
