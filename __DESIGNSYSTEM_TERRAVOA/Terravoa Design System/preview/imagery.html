<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--tv-surface);font-family:var(--tv-font-sans);}
  .row{display:flex;gap:18px;}
  .card{flex:1;}
  .img{height:170px;border-radius:var(--tv-radius-lg);background-size:cover;background-position:center;}
  .a{background-image:url('../assets/producers/rossi-estate.jpg');}
  .b{background-image:url('../assets/regions/france-lavender.jpg');}
  .c{background-image:url('../assets/stories/black-forest.jpg');}
  .quote{font-family:var(--tv-font-serif);font-style:italic;color:var(--tv-on-surface-variant);font-size:14px;margin-top:14px;line-height:1.4;}
</style></head>
<body>
<div class="row">
  <div class="card"><div class="img a"></div></div>
  <div class="card"><div class="img b"></div></div>
  <div class="card"><div class="img c"></div></div>
</div>
<div class="quote">"The secret isn't in the press, it's in the patience." — Warm, golden-hour, never-cool. Always the maker mid-task.</div>
</body></html>
