<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--tv-surface-container-low);font-family:var(--tv-font-sans);}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .step{background:var(--tv-surface);padding:14px 12px 16px;border-radius:var(--tv-radius-md);}
  .sw{height:48px;border-radius:var(--tv-radius-sm);}
  .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--tv-on-surface-variant);margin-top:8px;}
  .num{font-family:var(--tv-font-serif);color:var(--tv-primary);font-size:13px;margin-top:2px;font-feature-settings:"tnum";}
</style></head>
<body>
<div class="grid">
  <div class="step"><div class="sw" style="width:4px;background:var(--tv-primary);"></div><div class="lbl">space-1</div><div class="num">4</div></div>
  <div class="step"><div class="sw" style="width:8px;background:var(--tv-primary);"></div><div class="lbl">space-2</div><div class="num">8</div></div>
  <div class="step"><div class="sw" style="width:16px;background:var(--tv-primary);"></div><div class="lbl">space-4</div><div class="num">16</div></div>
  <div class="step"><div class="sw" style="width:24px;background:var(--tv-primary);"></div><div class="lbl">space-5</div><div class="num">24</div></div>
  <div class="step"><div class="sw" style="width:32px;background:var(--tv-primary);"></div><div class="lbl">space-6</div><div class="num">32</div></div>
  <div class="step"><div class="sw" style="width:48px;background:var(--tv-primary);"></div><div class="lbl">space-8</div><div class="num">48</div></div>
  <div class="step"><div class="sw" style="width:64px;background:var(--tv-primary);"></div><div class="lbl">space-10</div><div class="num">64</div></div>
  <div class="step"><div class="sw" style="width:96px;background:var(--tv-primary);"></div><div class="lbl">space-12</div><div class="num">96</div></div>
</div>
</body></html>
