<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--tv-surface);}
  .row{display:flex;gap:0;border-radius:var(--tv-radius-md);overflow:hidden;height:88px;box-shadow:var(--tv-shadow-sm);}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;font-family:var(--tv-font-sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;}
  .hex{font-size:9px;opacity:.75;letter-spacing:.05em;text-transform:none;}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--tv-tertiary);color:#fff;">Tertiary<span class="hex">#342306</span></div>
  <div class="sw" style="background:var(--tv-tertiary-container);color:#fff;">Container<span class="hex">#4c381a</span></div>
  <div class="sw" style="background:var(--tv-tertiary-fixed);color:var(--tv-tertiary);">Fixed (cream)<span class="hex">#feddb3</span></div>
  <div class="sw" style="background:var(--tv-tertiary-fixed-dim);color:var(--tv-tertiary);">Fixed-dim<span class="hex">#e1c299</span></div>
  <div class="sw" style="background:var(--tv-on-tertiary-container);color:var(--tv-tertiary);">On-container<span class="hex">#bea17b</span></div>
</div>
</body></html>
