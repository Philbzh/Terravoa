<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--tv-surface);}
  .hero{position:relative;height:340px;background:url('../assets/hero/hero-landscape.png') center/cover;display:flex;align-items:center;justify-content:center;}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(24,42,27,.4),rgba(24,42,27,.2) 50%,rgba(24,42,27,.6));}
  .body{position:relative;z-index:2;color:#fff;text-align:center;padding:0 32px;max-width:520px;}
  .kicker{font-family:var(--tv-font-sans);font-size:9px;letter-spacing:.35em;text-transform:uppercase;opacity:.7;margin-bottom:16px;}
  h1{font-family:var(--tv-font-serif);font-size:56px;line-height:1.05;font-weight:400;margin:0 0 14px;color:#fff;}
  .sub{font-family:var(--tv-font-sans);font-weight:300;font-size:14px;opacity:.9;line-height:1.5;}
  .tag{font-family:var(--tv-font-serif);font-style:italic;font-size:12px;opacity:.6;margin-top:10px;}
</style></head>
<body>
<div class="hero">
  <div class="body">
    <div class="kicker">Established 2024</div>
    <h1>Taste the Origin</h1>
    <div class="sub">Discover exceptional foods from Europe's finest producers — carefully selected and delivered directly from their source.</div>
    <div class="tag">— From Brittany's salt marshes to the Black Forest. —</div>
  </div>
</div>
</body></html>
